name: Secret Scan

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run gitleaks (blocking)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks@sha256:cdbb7c955abce02001a9f6c9f602fb195b7fadc1e812065883f695d1eeaba854 \
            detect --source . --report-format sarif --report-path gitleaks.sarif --redact --verbose

      - name: Upload gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7c9a7896f03bb1f3de14c5663ed46759e27443e0 # v4.31.9
        with:
          sarif_file: gitleaks.sarif

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: error
