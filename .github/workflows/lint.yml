name: Lint

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73 # v4.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle cache & setup
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          cache-disabled: false
          gradle-version: wrapper
          cache-read-only: false
          cache-key-prefix: >
            ${{ runner.os }}-gradle-
            ${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run detekt gate (blocking, baseline-aware)
        run: ./gradlew detektGate --console=plain --stacktrace

      - name: Install ktlint CLI
        env:
          KTLINT_VERSION: 1.3.1
          KTLINT_SHA256: a9f923be58fbd32670a17f0b729b1df804af882fa57402165741cb26e5440ca1
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/ktlint "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          echo "${KTLINT_SHA256}  /usr/local/bin/ktlint" | sha256sum -c -
          chmod +x /usr/local/bin/ktlint

      - name: Run ktlint gate (changed files only)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          is_zero_sha() {
            [ "${1:-}" = "0000000000000000000000000000000000000000" ]
          }

          sha_exists() {
            local sha="$1"
            [ -n "$sha" ] && git cat-file -e "${sha}^{commit}" >/dev/null 2>&1
          }

          default_range() {
            local base
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
            if sha_exists "$base"; then
              printf '%s...%s' "$base" "${{ github.sha }}"
            else
              printf '%s' "${{ github.sha }}"
            fi
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if sha_exists "$BASE_SHA"; then
              range="$BASE_SHA...${{ github.sha }}"
            else
              range="$(default_range)"
            fi
          else
            if [ -n "${BEFORE_SHA:-}" ] && ! is_zero_sha "$BEFORE_SHA" && sha_exists "$BEFORE_SHA"; then
              range="$BEFORE_SHA...${{ github.sha }}"
            else
              range="$(default_range)"
            fi
          fi

          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$range" -- '*.kt' '*.kts' \
              | sed '/^$/d'
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed Kotlin files — ktlint gate skipped"
            exit 0
          fi

          printf 'Running ktlint for %s files\n' "${#files[@]}"
          ktlint "${files[@]}"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lint-reports
          path: "**/build/reports/{detekt,ktlint}/**"
          if-no-files-found: ignore
