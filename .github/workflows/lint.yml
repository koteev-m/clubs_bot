name: Lint

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73 # v4.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle cache & setup
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          cache-disabled: false
          gradle-version: wrapper
          cache-read-only: false
          cache-key-prefix: >
            ${{ runner.os }}-gradle-
            ${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run detekt gate (blocking, baseline-aware)
        run: ./gradlew detektGate --console=plain --stacktrace

      - name: Load quality gate tool versions
        run: cat scripts/quality-gates.env >> "$GITHUB_ENV"

      - name: Run ktlint gate (changed files only)
        env:
          VERIFY_TO_SHA: ${{ github.sha }}
          VERIFY_FROM_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          KTLINT_BIN: /usr/local/bin/ktlint
        run: ./scripts/ktlint-changed.sh

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lint-reports
          path: |
            **/build/reports/detekt/**
            **/build/reports/ktlint/**
          if-no-files-found: ignore
