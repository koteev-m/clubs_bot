name: SCA Gate

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: sca-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up JDK 21
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73 # v4.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle cache & setup
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          cache-disabled: false
          gradle-version: wrapper
          cache-read-only: false
          cache-key-prefix: >
            ${{ runner.os }}-gradle-
            ${{ hashFiles('gradle.properties', 'gradle/libs.versions.toml', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Dependency-Check DB
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: .gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('build.gradle.kts', 'config/dependency-check/suppressions.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Run OWASP Dependency-Check (blocking)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew --no-configuration-cache scaCheck --console=plain --stacktrace

      - name: Upload SCA reports
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dependency-check-report
          path: |
            **/build/reports/dependency-check-report.html
            **/build/reports/dependency-check-report.json
          if-no-files-found: ignore
